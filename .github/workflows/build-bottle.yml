name: Build Bottles

on:
  release:
    types: [created]

jobs:
  bottle:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Build bottle
        run: |
          brew tap human37/duck-wispr
          brew install --build-bottle human37/duck-wispr/duck-wispr
          brew bottle --no-rebuild human37/duck-wispr/duck-wispr

      - name: Upload bottle to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in duck-wispr--*.bottle.tar.gz; do
            mv "$f" "$(echo "$f" | sed 's/--/-/')"
          done
          gh release upload "${{ github.event.release.tag_name }}" duck-wispr-*.bottle.tar.gz --repo human37/duck-wispr
